<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0d0f18" />
  <title>Logger</title>
  <link rel="stylesheet" href="/styles/main.css" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>

<!-- ── Loading overlay ── -->
<div id="loading-overlay">
  <span class="spinner" style="border-top-color:var(--accent);color:var(--border2)"></span>
</div>

<!-- ── Auth screen ── -->
<div id="auth-screen" style="display:none">
  <div class="auth-wordmark">Logger</div>
  <p class="auth-tagline">Track your hours</p>

  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="auth-login-tab">Sign in</button>
      <button class="auth-tab" id="auth-signup-tab">Sign up</button>
    </div>
    <div class="field">
      <label class="label" for="auth-email">Email</label>
      <input class="input" type="email" id="auth-email"
        placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="field">
      <label class="label" for="auth-password">Password</label>
      <input class="input" type="password" id="auth-password"
        placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn btn-primary" id="auth-submit-btn">Sign in</button>
    <button class="btn btn-ghost" id="auth-forgot-btn" style="margin-top:0.25rem;font-size:0.8rem">Forgot password?</button>
    <div id="auth-message" class="auth-error"></div>
  </div>
</div>

<!-- ── App screen ── -->
<div id="app-screen" style="display:none">

  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-wordmark">Logger</div>
    <div class="topbar-right">
      <span class="env-badge" id="env-badge"></span>
      <span class="topbar-user" id="topbar-user"></span>
      <button class="btn-signout" id="topbar-signout">Sign out</button>
    </div>
  </header>

  <!-- Pages -->
  <main>
    <div class="page active" id="page-log"></div>
    <div class="page" id="page-history"></div>
    <div class="page" id="page-km"></div>
    <div class="page" id="page-settings"></div>
  </main>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-route="/">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
      Log
    </button>
    <button class="nav-item" data-route="/km">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 8v4l3 3"/>
        <path d="M16.24 7.76l-2.12 2.12"/>
      </svg>
      KM
    </button>
    <button class="nav-item" data-route="/history">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M12 8v4l3 3"/>
        <path d="M3.05 11a9 9 0 1 1 .5 4M3 16v-5h5"/>
      </svg>
      History
    </button>
    <button class="nav-item" data-route="/settings">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      Settings
    </button>
    <a class="nav-item" id="nav-companion" href="#" target="_blank" rel="noopener">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
      </svg>
      Reikn
    </a>
  </nav>
</div>

<!-- Edit entry modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Edit Entry</div>
    <input type="hidden" id="edit-id" />
    <div class="card">
      <div class="field">
        <label class="label" for="edit-client">Client</label>
        <select class="input" id="edit-client"></select>
      </div>
      <div class="field">
        <label class="label" for="edit-name">Description</label>
        <input class="input" type="text" id="edit-name" autocomplete="off" />
      </div>
      <div class="field">
        <label class="label" for="edit-date">Date</label>
        <input class="input" type="date" id="edit-date" />
      </div>
      <div class="field">
        <div class="input-row">
          <div>
            <label class="label">From</label>
            <div class="time-select">
              <select class="input time-select-h" id="edit-from-h"></select>
              <span class="time-colon">:</span>
              <select class="input time-select-m" id="edit-from-m"></select>
            </div>
          </div>
          <div>
            <label class="label">Until</label>
            <div class="time-select">
              <select class="input time-select-h" id="edit-until-h"></select>
              <span class="time-colon">:</span>
              <select class="input time-select-m" id="edit-until-m"></select>
            </div>
          </div>
        </div>
      </div>
      <div class="duration-display">
        <span class="duration-label">Duration</span>
        <span class="duration-value" id="edit-duration-value">—</span>
      </div>
      <div id="edit-midnight" style="height:1.1rem;margin-top:0.4rem;text-align:center"></div>
    </div>
    <button class="btn btn-primary" id="edit-save-btn">Save changes</button>
    <button class="btn btn-ghost" id="edit-cancel-btn" style="margin-top:0.5rem">Cancel</button>
  </div>
</div>

<!-- KM edit modal -->
<div class="modal-overlay" id="km-edit-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Edit KM Entry</div>
    <input type="hidden" id="km-edit-id" />
    <div class="card">
      <div class="field">
        <label class="label">Client</label>
        <select class="input" id="km-edit-client"></select>
      </div>
      <div class="field">
        <label class="label">Date</label>
        <input class="input" type="date" id="km-edit-date" />
      </div>
      <div class="field input-row">
        <div>
          <label class="label">From</label>
          <input class="input" type="text" id="km-edit-from" autocomplete="off" />
        </div>
        <div>
          <label class="label">To</label>
          <input class="input" type="text" id="km-edit-to" autocomplete="off" />
        </div>
      </div>
      <div class="field">
        <label class="label">Kilometres</label>
        <div style="display:flex;gap:0.5rem;align-items:center">
          <input class="input" type="number" id="km-edit-km" min="0" step="0.1" style="flex:1" />
          <button class="btn-xs btn-xs-outline" id="km-edit-roundtrip" data-active="false"
            onclick="const b=this;const a=b.dataset.active!=='true';b.dataset.active=a;b.style.background=a?'var(--accent)':'';b.style.color=a?'#fff':'';b.style.border=a?'none':''">
            ↩ Round trip
          </button>
        </div>
      </div>
      <div class="field">
        <label class="label">Notes</label>
        <input class="input" type="text" id="km-edit-notes" placeholder="optional" />
      </div>
    </div>
    <button class="btn btn-primary" id="km-edit-save-btn">Save changes</button>
    <button class="btn btn-ghost" id="km-edit-cancel-btn" style="margin-top:0.5rem">Cancel</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- App bundle (built by esbuild) -->
<script type="module" src="/src/main.js"></script>

</body>
</html>
